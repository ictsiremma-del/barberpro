{% extends 'base.html' %}
{% block title %}Profile — BarberPro{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div style="max-width:440px">
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--gold-dim);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--gold)">
        {{ session.name[0] }}
      </div>
      <div>
        <div style="font-size:18px;font-weight:700">{{ session.name }}</div>
        <div style="font-size:13px;color:var(--text2)">@{{ session.username }} · {{ session.role|capitalize }}</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:16px">Change Password</div>
    <form method="POST">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required autocomplete="new-password" minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-gold">Update Password</button>
    </form>
  </div>
  <a href="{{ url_for('logout') }}" class="btn btn-danger" style="width:100%;justify-content:center">🚪 Logout</a>
</div>
{% endblock %}
